          in: query
          required: true
          schema: { type: string, format: date, example: "2026-05-08" }
          description: "Jour cible au format `YYYY-MM-DD`."
        - $ref: "#/components/parameters/XTractiveUser"
        - $ref: "#/components/parameters/XTractiveClient"
      responses:
        "200":
